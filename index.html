<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom — a meditation that listens</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>

  <!-- Reusable BLOOM flower SVG (white for dark backgrounds) -->
  <svg width="0" height="0" style="position:absolute" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <symbol id="bloomMark" viewBox="-100 -100 200 200">
        <g fill="#ffffff">
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z"/>
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z" transform="rotate(45)"/>
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z" transform="rotate(90)"/>
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z" transform="rotate(135)"/>
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z" transform="rotate(180)"/>
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z" transform="rotate(225)"/>
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z" transform="rotate(270)"/>
          <path d="M 0,0 C 6,-22 16,-44 6,-78 C -8,-72 -22,-58 -18,-38 C -14,-22 -4,-10 0,0 Z" transform="rotate(315)"/>
        </g>
      </symbol>
    </defs>
  </svg>

  <!-- LOADING -->
  <div id="loadingScreen">
    <svg id="loadingLogo" viewBox="-100 -100 200 200"><use href="#bloomMark"/></svg>
  </div>

  <!-- SCREEN 1 -->
  <div id="screen1" class="screen">
    <div id="topBar">
      <svg id="gbLogo" viewBox="-100 -100 200 200"><use href="#bloomMark"/></svg>
    </div>
    <div class="intro-center">
      <p class="intro-text">your answers join<br>the meditation.</p>
      <p id="countDisplay" class="count-display">&nbsp;</p>
    </div>
    <div id="arrowCircle"></div>
  </div>

  <!-- SCREEN 2 -->
  <div id="screen2" class="screen hidden">
    <svg id="gbLogo2" viewBox="-100 -100 200 200"><use href="#bloomMark"/></svg>

    <div class="question-block">
      <div class="question-header">
        <p class="questionText">something beautiful about your life?</p>
        <p id="wordCountB" class="word-count">0 words</p>
      </div>
      <textarea id="beautifulInput" class="input-text" placeholder="write here..."></textarea>
    </div>

    <div class="question-block">
      <div class="question-header">
        <p class="questionText">something you fear?</p>
        <p id="wordCountBr" class="word-count">0 words</p>
      </div>
      <textarea id="brokenInput" class="input-text" placeholder="write here..."></textarea>
    </div>

    <button id="submitBtn" disabled>leave it.</button>
  </div>

  <!-- SCREEN 3 -->
  <div id="screen3" class="screen hidden">
    <svg id="yinImg" viewBox="-100 -100 200 200"><use href="#bloomMark"/></svg>
    <p id="confirmationMessage">your answers have been received.</p>

    <div id="echoBlock">
      <div class="echo-row">
        <span class="echo-label">beautiful</span>
        <span id="echoBeautiful" class="echo-text"></span>
      </div>
      <div class="echo-row">
        <span class="echo-label">fear</span>
        <span id="echoBroken" class="echo-text"></span>
      </div>
    </div>

    <button id="seeOthersBtn">see others</button>
  </div>

  <!-- SCREEN 4 -->
  <div id="screen4" class="screen hidden">
    <div id="slideHeader">
      <span id="slideCounter"></span>
      <span id="pauseIndicator" class="pause-indicator hidden">paused</span>
    </div>

    <div id="slideCard">
      <p class="slide-label">beautiful</p>
      <p id="slideBeautiful" class="slide-text"></p>
      <p class="slide-label broken-label">fear</p>
      <p id="slideBroken" class="slide-text"></p>
    </div>

    <div id="slideProgress"><div id="slideProgressBar"></div></div>

    <div id="slideNav">
      <button id="slidePrev" class="nav-btn">←</button>
      <button id="slideNext" class="nav-btn">→</button>
    </div>
  </div>

</body>
</html>
